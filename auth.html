<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Mishra Family</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .login-header-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .login-header-subtitle {
            font-size: 14px;
            color: #666;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px 14px;
            border-radius: 4px;
            font-size: 12px;
            color: #1565c0;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .google-signin-section {
            margin-bottom: 20px;
        }

        .google-signin-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
        }

        #g_id_onload {
            display: flex;
            justify-content: center;
        }

        .g_id_signin {
            width: 100% !important;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .divider-text {
            position: relative;
            background: white;
            padding: 0 10px;
            color: #999;
            font-size: 12px;
            display: inline-block;
        }

        .guest-button {
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .guest-button:hover {
            background: #f9f9ff;
        }

        .alert {
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .session-info {
            display: none;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            border: 1px solid #e0e0e0;
        }

        .session-info.show {
            display: block;
        }

        .session-info-header {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .session-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e0e0e0;
        }

        .session-info-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .logout-button {
            width: 100%;
            padding: 10px 12px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .logout-button:hover {
            background: #da190b;
        }

        .trust-device-checkbox {
            display: flex;
            align-items: center;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }

        .trust-device-checkbox input {
            margin-right: 8px;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header-title {
                font-size: 24px;
            }

            .login-header-icon {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <span class="login-header-icon">👨‍👩‍👧‍👦</span>
            <h1 class="login-header-title">Mishra Family</h1>
            <p class="login-header-subtitle">Personal Records & Finance Manager</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <div class="info-box" id="infoBox">
            Sign in with Google. Device will be trusted for 30 days.
        </div>

        <!-- Google Sign-In Section -->
        <div class="google-signin-section">
            <div class="google-signin-title">Google Sign-In</div>
            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID"
                 data-callback="window.auth.handleCredentialResponse">
            </div>
            <div id="g_id_signin" style="display: flex; justify-content: center; margin-top: 10px;"></div>
        </div>

        <div class="trust-device-checkbox">
            <input type="checkbox" id="trustDevice" checked>
            <label for="trustDevice">Trust this device for 30 days</label>
        </div>

        <div class="divider">
            <span class="divider-text">or</span>
        </div>

        <!-- Guest Access -->
        <button class="guest-button" onclick="window.auth.loginAsGuest()">
            👁️ Access as Viewer (Read-Only)
        </button>

        <!-- Loading State -->
        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <p>Authenticating...</p>
        </div>

        <!-- Session Info -->
        <div id="sessionInfo" class="session-info">
            <div class="session-info-header">✅ Authenticated</div>
            <div class="session-info-item">
                <span>Email:</span>
                <span id="sessionEmail">-</span>
            </div>
            <div class="session-info-item">
                <span>Access Level:</span>
                <span id="sessionLevel">-</span>
            </div>
            <div class="session-info-item">
                <span>Device Status:</span>
                <span id="deviceStatus">-</span>
            </div>
            <button class="logout-button" onclick="window.auth.logout()">
                🚪 Sign Out
            </button>
        </div>
    </div>

    <script>
        window.auth = {
            SESSION_KEY: 'mishraFamilySession',
            DEVICE_KEY: 'mishraFamilyDevice',
            AUTHORIZED_EMAIL: 'seeksiddharth@gmail.com',
            SESSION_TIMEOUT: 24 * 60 * 60 * 1000, // 24 hours
            DEVICE_TRUST_DURATION: 30 * 24 * 60 * 60 * 1000, // 30 days

            init() {
                // Check if already logged in
                const session = this.getSession();
                if (session && this.isSessionValid(session)) {
                    this.displaySessionInfo(session);
                    return;
                }

                // Check if device is trusted
                const device = this.getDeviceData();
                if (device && this.isDeviceTrusted(device)) {
                    // Auto-login from trusted device
                    this.createSession(device.email, device.name, 'admin', true);
                    this.displaySessionInfo(this.getSession());
                    return;
                }

                // Initialize Google Sign-In
                this.initializeGoogleSignIn();
            },

            initializeGoogleSignIn() {
                if (window.google && window.google.accounts && window.google.accounts.id) {
                    window.google.accounts.id.renderButton(
                        document.getElementById('g_id_signin'),
                        {
                            theme: 'outline',
                            size: 'large',
                            width: '100%',
                            text: 'signin_with'
                        }
                    );
                }
            },

            handleCredentialResponse(response) {
                if (!response.credential) {
                    window.auth.showError('No credential received');
                    return;
                }

                window.auth.showLoading(true);

                // Decode JWT
                const payload = window.auth.decodeJWT(response.credential);
                const email = payload.email;
                const name = payload.name;
                const picture = payload.picture;

                // Check authorization
                if (email !== window.auth.AUTHORIZED_EMAIL) {
                    window.auth.showLoading(false);
                    window.auth.showError(
                        `❌ Access Denied: Only ${window.auth.AUTHORIZED_EMAIL} can access. You: ${email}`
                    );
                    return;
                }

                // Check if device should be trusted
                const trustDevice = document.getElementById('trustDevice').checked;
                if (trustDevice) {
                    window.auth.saveDeviceData(email, name, picture);
                }

                // Create session
                window.auth.createSession(email, name, 'admin', true);
                window.auth.showSuccess('✅ Authentication successful! Redirecting...');

                setTimeout(() => {
                    window.auth.redirectToDashboard();
                }, 1500);
            },

            decodeJWT(token) {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            },

            saveDeviceData(email, name, picture) {
                const deviceData = {
                    email,
                    name,
                    picture,
                    trustedAt: new Date().toISOString(),
                    expiresAt: new Date(Date.now() + this.DEVICE_TRUST_DURATION).toISOString()
                };
                localStorage.setItem(this.DEVICE_KEY, JSON.stringify(deviceData));
            },

            getDeviceData() {
                const data = localStorage.getItem(this.DEVICE_KEY);
                return data ? JSON.parse(data) : null;
            },

            isDeviceTrusted(device) {
                if (!device) return false;
                return new Date(device.expiresAt) > new Date();
            },

            createSession(email, name, accessLevel, rememberMe) {
                const session = {
                    email,
                    name,
                    accessLevel,
                    loginTime: new Date().toISOString(),
                    expiresAt: new Date(Date.now() + this.SESSION_TIMEOUT).toISOString(),
                    rememberMe,
                    authMethod: 'google'
                };

                if (rememberMe) {
                    localStorage.setItem(this.SESSION_KEY, JSON.stringify(session));
                } else {
                    sessionStorage.setItem(this.SESSION_KEY, JSON.stringify(session));
                }

                window.mishraSession = session;
            },

            getSession() {
                let session = localStorage.getItem(this.SESSION_KEY);
                if (session) return JSON.parse(session);

                session = sessionStorage.getItem(this.SESSION_KEY);
                if (session) return JSON.parse(session);

                return null;
            },

            isSessionValid(session) {
                if (!session) return false;
                return new Date(session.expiresAt) > new Date();
            },

            loginAsGuest() {
                this.createSession('guest@family.local', 'Guest User', 'viewer', false);
                this.showSuccess('✅ Accessing as viewer... Redirecting...');
                setTimeout(() => {
                    sessionStorage.setItem('mishraFamilyViewMode', 'read-only');
                    this.redirectToDashboard();
                }, 1500);
            },

            logout() {
                localStorage.removeItem(this.SESSION_KEY);
                sessionStorage.removeItem(this.SESSION_KEY);
                window.mishraSession = null;

                if (window.google && window.google.accounts && window.google.accounts.id) {
                    window.google.accounts.id.disableAutoSelect();
                }

                window.location.href = 'auth.html';
            },

            redirectToDashboard() {
                window.location.href = 'dashboard.html';
            },

            showLoading(show = true) {
                const loading = document.getElementById('loadingState');
                if (show) loading.classList.add('active');
                else loading.classList.remove('active');
            },

            showError(message) {
                const alertBox = document.getElementById('alertBox');
                alertBox.textContent = message;
                alertBox.className = 'alert error show';
                this.showLoading(false);
            },

            showSuccess(message) {
                const alertBox = document.getElementById('alertBox');
                alertBox.textContent = message;
                alertBox.className = 'alert success show';
            },

            displaySessionInfo(session) {
                const sessionInfo = document.getElementById('sessionInfo');
                document.getElementById('sessionEmail').textContent = session.email;
                document.getElementById('sessionLevel').textContent = session.accessLevel === 'admin' ? 'Admin (Full Access)' : 'Viewer (Read-Only)';

                const device = this.getDeviceData();
                const isTrusted = device && this.isDeviceTrusted(device);
                document.getElementById('deviceStatus').textContent = isTrusted ? '✅ Trusted' : '❌ Not Trusted';

                // Hide login form, show session info
                document.querySelector('.info-box').style.display = 'none';
                document.querySelector('.google-signin-section').style.display = 'none';
                document.querySelector('.trust-device-checkbox').style.display = 'none';
                document.querySelector('.divider').style.display = 'none';
                document.querySelector('.guest-button').style.display = 'none';

                sessionInfo.classList.add('show');
            }
        };

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            window.auth.init();
        });
    </script>
</body>
</html>
