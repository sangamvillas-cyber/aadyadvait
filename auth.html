<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Mishra Family</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .login-header-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .login-header-subtitle {
            font-size: 14px;
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: #f9f9ff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-input::placeholder {
            color: #999;
        }

        .form-error {
            border-color: #f44336 !important;
        }

        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-container input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .checkbox-container label {
            cursor: pointer;
            color: #666;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            transition: all 0.3s;
        }

        .forgot-password:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .login-button {
            width: 100%;
            padding: 14px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .demo-button {
            width: 100%;
            padding: 12px 16px;
            background: #f5f5f5;
            color: #333;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .demo-button:hover {
            border-color: #667eea;
            background: #f9f9ff;
            color: #667eea;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .divider-text {
            position: relative;
            background: white;
            padding: 0 10px;
            color: #999;
            font-size: 12px;
            display: inline-block;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px 14px;
            border-radius: 4px;
            font-size: 12px;
            color: #1565c0;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .guest-button {
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .guest-button:hover {
            background: #f9f9ff;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
        }

        @keyframes spin {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }

        .login-button-wrapper {
            position: relative;
        }

        .login-button.loading {
            color: transparent;
        }

        .login-button.loading .loading-spinner {
            display: block;
        }

        /* Session info */
        .session-info {
            display: none;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            border: 1px solid #e0e0e0;
        }

        .session-info.show {
            display: block;
        }

        .session-info-header {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .session-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e0e0e0;
        }

        .session-info-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header-title {
                font-size: 24px;
            }

            .login-header-icon {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <span class="login-header-icon">👨‍👩‍👧‍👦</span>
            <h1 class="login-header-title">Mishra Family</h1>
            <p class="login-header-subtitle">Personal Records & Finance Manager</p>
        </div>

        <div class="info-box" id="infoBox">
            Master login required. Use your email and password to access the family records.
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input
                    type="email"
                    id="emailInput"
                    class="form-input"
                    placeholder="seeksiddharth@gmail.com"
                    required
                />
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <input
                        type="password"
                        id="passwordInput"
                        class="form-input"
                        placeholder="••••••••"
                        minlength="6"
                        required
                    />
                    <div class="error-message" id="passwordError"></div>
                </div>
            </div>

            <div class="form-footer">
                <div class="checkbox-container">
                    <input type="checkbox" id="rememberMe" />
                    <label for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="forgot-password" id="forgotPassword">Forgot password?</a>
            </div>

            <div class="login-button-wrapper">
                <button type="submit" class="login-button" id="loginBtn">
                    Sign In
                    <div class="loading-spinner"></div>
                </button>
            </div>
        </form>

        <div class="divider">
            <span class="divider-text">or</span>
        </div>

        <button class="guest-button" onclick="window.auth.loginAsGuest()">
            👁️ Access as Viewer (Read-Only)
        </button>

        <div class="session-info" id="sessionInfo">
            <div class="session-info-header">Current Session</div>
            <div class="session-info-item">
                <span>Email:</span>
                <span id="sessionEmail">-</span>
            </div>
            <div class="session-info-item">
                <span>Access Level:</span>
                <span id="sessionLevel">-</span>
            </div>
            <div class="session-info-item">
                <span>Login Time:</span>
                <span id="sessionTime">-</span>
            </div>
        </div>
    </div>

    <script>
        // Master credentials
        const MASTER_EMAIL = 'seeksiddharth@gmail.com';
        const MASTER_PASSWORD_HASH = 'family2024'; // In production, use bcrypt or similar

        // Authentication Module
        window.auth = {
            SESSION_KEY: 'mishraFamilySession',
            SESSION_TIMEOUT: 24 * 60 * 60 * 1000, // 24 hours

            init() {
                const form = document.getElementById('loginForm');
                form.addEventListener('submit', (e) => this.handleLogin(e));
                document.getElementById('forgotPassword').addEventListener('click', (e) => {
                    e.preventDefault();
                    this.showError('Please contact the system administrator to reset your password');
                });

                // Check if already logged in
                const session = this.getSession();
                if (session && this.isSessionValid(session)) {
                    this.redirectToDashboard();
                }

                // Show session info if available
                if (session) {
                    this.displaySessionInfo(session);
                }
            },

            handleLogin(e) {
                e.preventDefault();

                const email = document.getElementById('emailInput').value.trim();
                const password = document.getElementById('passwordInput').value;
                const rememberMe = document.getElementById('rememberMe').checked;

                // Clear previous errors
                this.clearErrors();

                // Validate inputs
                if (!email) {
                    this.showFieldError('emailError', 'Email is required');
                    return;
                }

                if (!password) {
                    this.showFieldError('passwordError', 'Password is required');
                    return;
                }

                if (password.length < 6) {
                    this.showFieldError('passwordError', 'Password must be at least 6 characters');
                    return;
                }

                // Check credentials
                if (email === MASTER_EMAIL && password === MASTER_PASSWORD_HASH) {
                    this.createSession(email, 'admin', rememberMe);
                    this.showSuccess('✅ Login successful! Redirecting...');
                    setTimeout(() => this.redirectToDashboard(), 1500);
                } else {
                    this.showError('❌ Invalid email or password');
                    // Shake animation
                    document.getElementById('loginForm').style.animation = 'shake 0.5s';
                    setTimeout(() => {
                        document.getElementById('loginForm').style.animation = '';
                    }, 500);
                }
            },

            loginAsGuest() {
                this.createSession('guest@family.local', 'viewer', false);
                this.showSuccess('✅ Accessing as viewer... Redirecting...');
                setTimeout(() => this.redirectToDashboard(true), 1500);
            },

            createSession(email, accessLevel, rememberMe) {
                const session = {
                    email,
                    accessLevel,
                    loginTime: new Date().toISOString(),
                    expiresAt: new Date(Date.now() + this.SESSION_TIMEOUT).toISOString(),
                    rememberMe
                };

                if (rememberMe) {
                    localStorage.setItem(this.SESSION_KEY, JSON.stringify(session));
                } else {
                    sessionStorage.setItem(this.SESSION_KEY, JSON.stringify(session));
                }

                window.mishraSession = session;
            },

            getSession() {
                // Try localStorage first (if "remember me" was checked)
                let session = localStorage.getItem(this.SESSION_KEY);
                if (session) return JSON.parse(session);

                // Try sessionStorage
                session = sessionStorage.getItem(this.SESSION_KEY);
                if (session) return JSON.parse(session);

                return null;
            },

            isSessionValid(session) {
                if (!session) return false;
                return new Date(session.expiresAt) > new Date();
            },

            logout() {
                localStorage.removeItem(this.SESSION_KEY);
                sessionStorage.removeItem(this.SESSION_KEY);
                window.mishraSession = null;
                window.location.href = 'auth.html';
            },

            redirectToDashboard(isGuest = false) {
                // Store guest mode if applicable
                if (isGuest) {
                    sessionStorage.setItem('mishraFamilyViewMode', 'read-only');
                }
                window.location.href = 'dashboard.html';
            },

            showError(message) {
                document.getElementById('infoBox').innerHTML = `<strong>⚠️ Error:</strong> ${message}`;
                document.getElementById('infoBox').style.background = '#ffebee';
                document.getElementById('infoBox').style.borderLeftColor = '#f44336';
                document.getElementById('infoBox').style.color = '#c62828';
            },

            showSuccess(message) {
                document.getElementById('infoBox').innerHTML = message;
                document.getElementById('infoBox').style.background = '#e8f5e9';
                document.getElementById('infoBox').style.borderLeftColor = '#4caf50';
                document.getElementById('infoBox').style.color = '#2e7d32';
            },

            showFieldError(fieldId, message) {
                const errorEl = document.getElementById(fieldId);
                errorEl.textContent = message;
                errorEl.classList.add('show');

                // Add error state to input
                const inputId = fieldId.replace('Error', 'Input');
                document.getElementById(inputId).classList.add('form-error');
            },

            clearErrors() {
                document.querySelectorAll('.error-message').forEach(el => {
                    el.classList.remove('show');
                    el.textContent = '';
                });
                document.querySelectorAll('.form-input').forEach(el => {
                    el.classList.remove('form-error');
                });
            },

            displaySessionInfo(session) {
                const sessionInfo = document.getElementById('sessionInfo');
                document.getElementById('sessionEmail').textContent = session.email;
                document.getElementById('sessionLevel').textContent = session.accessLevel === 'admin' ? 'Master (Full Access)' : 'Viewer (Read-Only)';
                document.getElementById('sessionTime').textContent = new Date(session.loginTime).toLocaleString('en-IN');
                sessionInfo.classList.add('show');
            }
        };

        // Initialize authentication
        document.addEventListener('DOMContentLoaded', () => {
            window.auth.init();
        });

        // Add CSS animation for shake effect
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
