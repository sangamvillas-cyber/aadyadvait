<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siddharth Profile — Advait</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f766e;
      --primary-light: #14b8a6;
      --primary-lighter: #ccfbf1;
      --neutral-50: #fafafa;
      --neutral-100: #f5f5f5;
      --neutral-200: #e5e5e5;
      --neutral-600: #525252;
      --neutral-900: #171717;
      --danger: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--neutral-50);
      color: var(--neutral-900);
      line-height: 1.6;
    }

    .profile-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      padding: 3rem 2rem;
      text-align: center;
    }

    .profile-avatar {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .profile-name {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .profile-title {
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 1rem;
    }

    .back-link {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: white;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .summary-card {
      background: white;
      border: 1px solid var(--neutral-200);
      border-radius: 8px;
      padding: 1.5rem;
    }

    .summary-label {
      font-size: 0.875rem;
      color: var(--neutral-600);
      margin-bottom: 0.5rem;
    }

    .summary-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--neutral-900);
    }

    .summary-subtext {
      font-size: 0.875rem;
      color: #10b981;
      margin-top: 0.5rem;
    }

    .tracking-section {
      background: white;
      border: 1px solid var(--neutral-200);
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--neutral-900);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead {
      background: var(--neutral-100);
      border-bottom: 2px solid var(--neutral-200);
    }

    th {
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      color: var(--neutral-900);
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid var(--neutral-200);
    }

    tr:hover {
      background: var(--neutral-50);
    }

    .fund-name {
      color: var(--primary);
      font-weight: 500;
    }

    .gain-positive {
      color: #10b981;
      font-weight: 600;
    }

    .gain-negative {
      color: var(--danger);
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .profile-header {
        padding: 2rem 1rem;
      }

      .profile-name {
        font-size: 1.5rem;
      }

      table {
        font-size: 0.75rem;
      }

      th, td {
        padding: 0.75rem 0.5rem;
      }
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .back-link {
      font-family: inherit;
      font-size: 0.95rem;
    }

    @media print {
      .header-actions, .profile-avatar { display: none !important; }
      body { background: white !important; }
      .profile-header {
        color: black !important;
        background: white !important;
        padding: 1rem 0 !important;
      }
      .profile-name, .profile-title { color: black !important; }
      .tracking-section { break-inside: avoid; border: none; }
      .summary-card { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="profile-header">
    <div class="profile-avatar">👨</div>
    <div class="profile-name">Siddharth Mishra</div>
    <div class="profile-title">PAN: AOMPM8103N</div>
    <div class="header-actions">
      <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
      <button class="back-link" onclick="exportCSV()">📥 Export CSV</button>
      <button class="back-link" onclick="window.print()">🖨️ Print</button>
    </div>
  </div>

  <div class="container">
    <!-- Summary Cards -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">Total Invested</div>
        <div class="summary-value" id="totalInvested">₹0.00</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Current Value</div>
        <div class="summary-value" id="currentValue">₹0.00</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Total Gain</div>
        <div class="summary-value gain-positive" id="totalGain">₹0.00</div>
        <div class="summary-subtext" id="gainPercent">+0.00%</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Overall XIRR</div>
        <div class="summary-value" id="overallXIRR">0.00%</div>
      </div>
    </div>

    <!-- Mutual Funds Holding -->
    <div class="tracking-section">
      <div class="section-title">💼 Mutual Funds Tracker</div>
      <div style="overflow-x: auto;">
        <table id="trackingTable">
          <thead>
            <tr>
              <th>Fund</th>
              <th style="text-align: center;">Folio</th>
              <th style="text-align: right;">Units</th>
              <th style="text-align: right;">Current NAV</th>
              <th style="text-align: right;">Purchase Value</th>
              <th style="text-align: right;">Current Value</th>
              <th style="text-align: right;">Gain/Loss</th>
              <th style="text-align: right;">XIRR %</th>
            </tr>
          </thead>
          <tbody id="trackingTableBody">
          </tbody>
        </table>
      </div>
    </div>

    <!-- Fund Summary -->
    <div class="tracking-section">
      <div class="section-title">📊 Portfolio Summary</div>
      <div id="fundSummary" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
      </div>
    </div>
  </div>

  <script>
    function exportCSV() {
      const data = window.__memberData;
      if (!data) { alert('Data not loaded yet'); return; }
      const referenceDate = new Date('2026-05-11');
      const rows = data.transactions.map(txn => {
        const pv = txn.units * txn.purchaseNav;
        const cv = txn.units * txn.currentNav;
        const gain = cv - pv;
        const purchaseDate = new Date(txn.purchaseDate);
        const yrs = (referenceDate - purchaseDate) / (365.25 * 24 * 60 * 60 * 1000);
        const xirr = yrs > 0 ? (Math.pow(cv / pv, 1 / yrs) - 1) * 100 : 0;
        return [txn.fund, txn.folio, txn.units.toFixed(3), txn.purchaseDate, txn.purchaseNav.toFixed(4), txn.currentNav.toFixed(4), pv.toFixed(2), cv.toFixed(2), gain.toFixed(2), xirr.toFixed(2) + '%'];
      });
      const headers = ['Fund','Folio','Units','Purchase Date','Purchase NAV','Current NAV','Purchase Value','Current Value','Gain/Loss','XIRR %'];
      const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'siddharth-holdings-' + new Date().toISOString().slice(0,10) + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }

    async function loadProfileData() {
      try {
        const response = await fetch('tracking-data.json?t=' + Date.now(), {cache: 'no-store'});
        const data = await response.json();
        const memberData = data.siddharth;
        window.__memberData = memberData;

        // Update summary cards
        document.getElementById('totalInvested').textContent = '₹' + memberData.totalInvested.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('currentValue').textContent = '₹' + memberData.totalCurrentValue.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        const gainColor = memberData.totalGain >= 0 ? '#10b981' : '#ef4444';
        document.getElementById('totalGain').textContent = (memberData.totalGain >= 0 ? '₹' : '-₹') + Math.abs(memberData.totalGain).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('totalGain').style.color = gainColor;

        const percentText = (memberData.totalGainPercent >= 0 ? '+' : '') + memberData.totalGainPercent.toFixed(2) + '%';
        document.getElementById('gainPercent').textContent = percentText;
        document.getElementById('gainPercent').style.color = gainColor;

        document.getElementById('overallXIRR').textContent = memberData.overallXIRR.toFixed(2) + '%';

        // Build tracking table
        let tableHtml = '';
        const referenceDate = new Date('2026-05-11'); // Reference date for XIRR calculation
        memberData.transactions.forEach(txn => {
          const purchaseValue = txn.units * txn.purchaseNav;
          const currentValue = txn.units * txn.currentNav;
          const gain = currentValue - purchaseValue;

          // Calculate XIRR: ((currentValue / purchaseValue) ^ (1 / yearsHeld)) - 1) * 100
          const purchaseDate = new Date(txn.purchaseDate);
          const yearsHeld = (referenceDate - purchaseDate) / (365.25 * 24 * 60 * 60 * 1000);
          const xirr = yearsHeld > 0 ? (Math.pow(currentValue / purchaseValue, 1 / yearsHeld) - 1) * 100 : 0;

          tableHtml += `<tr>
            <td class="fund-name">${txn.fund}</td>
            <td style="text-align: center; font-family: monospace;">${txn.folio}</td>
            <td style="text-align: right;">${txn.units.toFixed(2)}</td>
            <td style="text-align: right;">₹${txn.currentNav.toFixed(2)}</td>
            <td style="text-align: right;">₹${purchaseValue.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
            <td style="text-align: right; font-weight: 600;">₹${currentValue.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
            <td style="text-align: right;" class="${gain >= 0 ? 'gain-positive' : 'gain-negative'}">₹${Math.abs(gain).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
            <td style="text-align: right;" class="${xirr >= 0 ? 'gain-positive' : 'gain-negative'}">${(xirr >= 0 ? '+' : '')}${xirr.toFixed(2)}%</td>
          </tr>`;
        });

        document.getElementById('trackingTableBody').innerHTML = tableHtml;

        // Fund house summary
        const fundHouseSummary = {};
        memberData.transactions.forEach(txn => {
          if (!fundHouseSummary[txn.fundHouse]) {
            fundHouseSummary[txn.fundHouse] = { count: 0, value: 0 };
          }
          fundHouseSummary[txn.fundHouse].count++;
          fundHouseSummary[txn.fundHouse].value += txn.units * txn.currentNav;
        });

        let summaryHtml = '';
        Object.entries(fundHouseSummary).forEach(([house, data]) => {
          summaryHtml += `
            <div style="background: var(--primary-lighter); padding: 1rem; border-radius: 8px;">
              <div style="font-weight: 600; color: var(--primary); margin-bottom: 0.5rem;">${house}</div>
              <div style="font-size: 0.875rem; color: var(--neutral-600); margin-bottom: 0.5rem;">${data.count} fund(s)</div>
              <div style="font-size: 1.25rem; font-weight: 700; color: var(--primary);">₹${data.value.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
            </div>
          `;
        });

        document.getElementById('fundSummary').innerHTML = summaryHtml;
      } catch (error) {
        console.error('Error loading profile data:', error);
      }
    }

    document.addEventListener('DOMContentLoaded', loadProfileData);
  </script>
</body>
</html>
