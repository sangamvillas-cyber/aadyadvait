<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siddharth · Mishra Family Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #FAF9F5;
      --bg-surface: #FFFFFF;
      --bg-elevated: #F5F4ED;
      --bg-hover: #EFEEE6;
      --border-subtle: #E8E5DE;
      --border-default: #D7D3C7;
      --text-primary: #1A1817;
      --text-secondary: #5C5A55;
      --text-tertiary: #8A8780;
      --accent: #C96442;
      --accent-hover: #B5563A;
      --accent-soft: #F4E4DC;
      --success: #2E7D4F;
      --danger: #C53030;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 2px rgba(26, 24, 23, 0.04);
      --shadow-md: 0 4px 12px rgba(26, 24, 23, 0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* Top Bar */
    .topbar {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0.875rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-brand { display: flex; align-items: center; gap: 0.625rem; }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.875rem;
    }

    .brand-title {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.0625rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .header-actions { display: flex; gap: 0.5rem; }

    .btn {
      background: transparent;
      border: 1px solid var(--border-default);
      color: var(--text-secondary);
      padding: 0.5rem 0.875rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      transition: all 0.15s ease;
    }

    .btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--text-tertiary);
    }

    .btn-primary {
      background: var(--text-primary);
      color: white;
      border-color: var(--text-primary);
    }

    .btn-primary:hover {
      background: #000;
      color: white;
      border-color: #000;
    }

    /* Page */
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .profile-identity { display: flex; align-items: center; gap: 1rem; }

    .profile-avatar {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--accent-soft);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.375rem;
      font-family: 'Source Serif 4', Georgia, serif;
    }

    .profile-name {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.875rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 0.125rem;
    }

    .profile-meta {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 1.25rem 1.375rem;
    }

    .stat-label {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.625rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .stat-delta { font-size: 0.8125rem; font-weight: 500; margin-top: 0.375rem; }
    .stat-delta.positive { color: var(--success); }
    .stat-delta.negative { color: var(--danger); }

    /* Section */
    .section-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .section-card-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
    }

    .section-card-title {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Table */
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }

    th {
      padding: 0.875rem 1rem;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border-subtle);
    }

    td {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-primary);
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--bg-elevated); }

    .text-right { text-align: right; }
    .text-center { text-align: center; }
    .mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.8125rem; }
    .fund-name { color: var(--text-primary); font-weight: 500; }
    .pos { color: var(--success); font-weight: 600; }
    .neg { color: var(--danger); font-weight: 600; }

    /* Portfolio Summary chips */
    .chips {
      padding: 1.25rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.75rem;
    }

    .chip {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 0.875rem 1rem;
    }

    .chip-label {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      margin-bottom: 0.25rem;
      letter-spacing: 0.02em;
    }

    .chip-count {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 0.375rem;
    }

    .chip-value {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.0625rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    @media print {
      @page { size: A4 portrait; margin: 12mm 14mm; }
      .topbar, .header-actions { display: none !important; }
      html, body { background: white !important; font-size: 11pt; }
      .page { padding: 0; max-width: 100%; }
      .page-header { margin-bottom: 0.75rem; }
      .profile-avatar { width: 40px; height: 40px; font-size: 1rem; border-radius: 10px; }
      .profile-name { font-size: 1.375rem; margin-bottom: 0; }
      .profile-meta { font-size: 0.75rem; }
      .stats-grid { gap: 0.5rem; margin-bottom: 0.875rem; grid-template-columns: repeat(4, 1fr); }
      .stat-card { padding: 0.625rem 0.75rem; }
      .stat-label { font-size: 0.65rem; margin-bottom: 0.25rem; }
      .stat-value { font-size: 1rem; }
      .stat-delta { font-size: 0.65rem; margin-top: 0.125rem; }
      .section-card { border-color: #d4d4d4; box-shadow: none; margin-bottom: 0.625rem; break-inside: avoid; }
      .section-card-header { padding: 0.5rem 0.75rem; }
      .section-card-title { font-size: 0.8125rem; }
      table { font-size: 0.7rem; }
      th { padding: 0.4rem 0.5rem; font-size: 0.6rem; }
      td { padding: 0.4rem 0.5rem; }
      .chips { padding: 0.5rem; gap: 0.375rem; grid-template-columns: repeat(4, 1fr); }
      .chip { padding: 0.4rem 0.5rem; }
      .chip-label { font-size: 0.625rem; }
      .chip-count { font-size: 0.6rem; margin-bottom: 0.125rem; }
      .chip-value { font-size: 0.75rem; }
      tbody tr:hover { background: transparent !important; }
      .pos { color: #1e6a3d !important; }
      .neg { color: #a82a2a !important; }
    }

    @media (max-width: 640px) {
      .topbar { padding: 0.75rem 1rem; }
      .page { padding: 1.5rem 1rem; }
      .profile-name { font-size: 1.5rem; }
      .stat-value { font-size: 1.375rem; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="dashboard.html" class="topbar-brand" style="text-decoration:none;color:inherit;">
      <div class="brand-mark">M</div>
      <div class="brand-title">Mishra Family Portfolio</div>
    </a>
    <div class="header-actions">
      <a href="dashboard.html" class="btn">← Dashboard</a>
      <button class="btn btn-primary" onclick="window.print()">Export PDF</button>
    </div>
  </header>

  <main class="page">
    <div class="page-header">
      <div class="profile-identity">
        <div class="profile-avatar">S</div>
        <div>
          <div class="profile-name">Siddharth Mishra</div>
          <div class="profile-meta">Father · PAN AOMPM8103N</div>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total invested</div><div class="stat-value" id="totalInvested">—</div></div>
      <div class="stat-card"><div class="stat-label">Current value</div><div class="stat-value" id="currentValue">—</div></div>
      <div class="stat-card"><div class="stat-label">Total gain</div><div class="stat-value" id="totalGain">—</div><div class="stat-delta" id="gainPercent">—</div></div>
      <div class="stat-card"><div class="stat-label">Overall XIRR</div><div class="stat-value" id="overallXIRR">—</div></div>
    </div>

    <div class="section-card">
      <div class="section-card-header"><div class="section-card-title">Mutual fund holdings</div></div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Fund</th>
              <th class="text-center">Folio</th>
              <th class="text-right">Units</th>
              <th class="text-right">Current NAV</th>
              <th class="text-right">Purchase value</th>
              <th class="text-right">Current value</th>
              <th class="text-right">Gain/loss</th>
              <th class="text-right">XIRR</th>
            </tr>
          </thead>
          <tbody id="trackingTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="section-card">
      <div class="section-card-header"><div class="section-card-title">Portfolio by fund house</div></div>
      <div class="chips" id="fundSummary"></div>
    </div>
  </main>

  <script>
    const MEMBER_ID = 'siddharth';

    async function loadProfileData() {
      try {
        const response = await fetch('tracking-data.json?t=' + Date.now(), {cache: 'no-store'});
        const data = await response.json();
        const memberData = data[MEMBER_ID];
        window.__memberData = memberData;

        const fmt = n => '₹' + Number(n).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        const fmtCompact = n => {
          if (n >= 10000000) return '₹' + (n / 10000000).toFixed(2) + ' Cr';
          if (n >= 100000) return '₹' + (n / 100000).toFixed(2) + ' L';
          return fmt(n);
        };

        document.getElementById('totalInvested').textContent = fmtCompact(memberData.totalInvested);
        document.getElementById('currentValue').textContent = fmtCompact(memberData.totalCurrentValue);

        const gainEl = document.getElementById('totalGain');
        gainEl.textContent = (memberData.totalGain >= 0 ? '' : '−') + fmtCompact(Math.abs(memberData.totalGain));
        const pctEl = document.getElementById('gainPercent');
        pctEl.textContent = (memberData.totalGain >= 0 ? '+' : '') + memberData.totalGainPercent.toFixed(2) + '%';
        pctEl.className = 'stat-delta ' + (memberData.totalGain >= 0 ? 'positive' : 'negative');

        document.getElementById('overallXIRR').textContent = memberData.overallXIRR.toFixed(2) + '%';

        const refDate = new Date('2026-05-12');
        let tableHtml = '';
        memberData.transactions.forEach(txn => {
          const pv = txn.units * txn.purchaseNav;
          const cv = txn.units * txn.currentNav;
          const gain = cv - pv;
          const yrs = (refDate - new Date(txn.purchaseDate)) / (365.25 * 24 * 60 * 60 * 1000);
          const xirr = yrs > 0 ? (Math.pow(cv / pv, 1 / yrs) - 1) * 100 : 0;
          const cls = gain >= 0 ? 'pos' : 'neg';
          tableHtml += `<tr>
            <td class="fund-name">${txn.fund}</td>
            <td class="text-center mono">${txn.folio}</td>
            <td class="text-right">${txn.units.toFixed(2)}</td>
            <td class="text-right mono">₹${txn.currentNav.toFixed(2)}</td>
            <td class="text-right">${fmt(pv)}</td>
            <td class="text-right">${fmt(cv)}</td>
            <td class="text-right ${cls}">${gain >= 0 ? '+' : ''}${fmt(gain)}</td>
            <td class="text-right ${cls}">${xirr >= 0 ? '+' : ''}${xirr.toFixed(2)}%</td>
          </tr>`;
        });
        document.getElementById('trackingTableBody').innerHTML = tableHtml;

        const fundHouseSummary = {};
        memberData.transactions.forEach(txn => {
          if (!fundHouseSummary[txn.fundHouse]) fundHouseSummary[txn.fundHouse] = {count: 0, value: 0};
          fundHouseSummary[txn.fundHouse].count++;
          fundHouseSummary[txn.fundHouse].value += txn.units * txn.currentNav;
        });

        document.getElementById('fundSummary').innerHTML = Object.entries(fundHouseSummary)
          .sort((a, b) => b[1].value - a[1].value)
          .map(([house, d]) => `<div class="chip">
            <div class="chip-label">${house}</div>
            <div class="chip-count">${d.count} fund${d.count > 1 ? 's' : ''}</div>
            <div class="chip-value">${fmt(d.value)}</div>
          </div>`).join('');
      } catch (err) {
        console.error('Error loading profile data:', err);
      }
    }

    document.addEventListener('DOMContentLoaded', loadProfileData);
  </script>
</body>
</html>
